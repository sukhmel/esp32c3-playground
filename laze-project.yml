imports:
  - git:
      url: https://github.com/ariel-os/ariel-os
      tag: v0.4.0
    dldir: ariel-os

apps:
  - name: esp32c3-playground
    selects:
      - network
    env:
      global:
        CARGO_ENV:
          # this is only necessary for async display driver, since it can't draw without buffer
          - "CONFIG_HEAPSIZE=220000"