imports:
  - git:
      url: https://github.com/ariel-os/ariel-os
      tag: v0.4.0
    dldir: ariel-os

apps:
  - name: esp32c3-playground
    selects:
      - network
      - ble-peripheral
    env:
      global:
        CARGO_ENV:
          # This board's default executor stack (8192) seems too small for the
          # WiFi(net_task) + BLE + async-display workload sharing one executor
          # thread; net_task's smoltcp/esp-radio poll chain overflows it and
          # corrupts adjacent static state (surfaces as embassy-net "RefCell
          # already borrowed")
          - "CONFIG_EXECUTOR_STACKSIZE=16384"
          - "CONFIG_HEAPSIZE=150000"
          # esp-radio's btController/wifi tasks request priority 29 and get
          # clamped to the scheduler max (15), preempting the executor (default
          # priority 8) mid-rendering. Running the executor at higher priority
          # helps a bit.
          - "CONFIG_EXECUTOR_THREAD_PRIORITY=14"

        # does not work
#         - "ESPFLASH_PARTITION_TABLE=partitions.csv"
#        - "CONFIG_PARTITION_TABLE_SINGLE_APP_LARGE=y"
#       I took it from the doc for nimBLE, but it seems not needed when used with troBLE
#        - "CONFIG_BT_ENABLED=y"
#        - "CONFIG_BT_BLE_ENABLED=y"
#        - "CONFIG_BT_BLUEDROID_ENABLED=n"
#        - "CONFIG_BT_NIMBLE_ENABLED=y"
#        - "CONFIG_BT_NIMBLE_EXT_ADV=y"
#        - "CONFIG_BT_NIMBLE_NVS_PERSIST=y"
        # may be needed for large return values
        # - "CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=7000"
